# VERCEL_TOKEN 유효성 주 1회 자동 검사
# 만료/무효 감지 시 GitHub Issue 자동 생성
# 실행: 매주 월요일 09:00 KST (00:00 UTC)

name: Vercel Token Health Check

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check VERCEL_TOKEN validity
        id: token_check
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v2/user")

          echo "status=$HTTP_STATUS" >> $GITHUB_OUTPUT

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ VERCEL_TOKEN 유효 (HTTP $HTTP_STATUS)"
          else
            echo "❌ VERCEL_TOKEN 무효 또는 만료 (HTTP $HTTP_STATUS)"
          fi

      - name: Create issue if token invalid
        if: steps.token_check.outputs.status != '200'
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.token_check.outputs.status }}';

            // 이미 열린 동일 이슈 있으면 중복 생성 안 함
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'vercel-token-expired'
            });

            if (issues.data.length > 0) {
              console.log('이미 열린 토큰 만료 이슈 존재, 중복 생성 생략');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔑 VERCEL_TOKEN 만료 — GitHub Actions 배포 불가',
              body: [
                '## 문제',
                `VERCEL_TOKEN이 만료되었거나 무효입니다. (HTTP ${status})`,
                '',
                '## 해결 방법',
                '1. [Vercel 토큰 페이지](https://vercel.com/account/tokens) → **Create** → Expiration: **No Expiration**',
                '2. GitHub 리포 → **Settings → Secrets → Actions** → `VERCEL_TOKEN` → **Update**',
                '',
                '## 임시 배포 방법 (토큰 갱신 전)',
                '로컬에서 `npm run deploy` 실행 → vercel --prod fallback 자동 실행',
                '',
                '---',
                '🤖 Generated by Vercel Token Health Check workflow'
              ].join('\n'),
              labels: ['vercel-token-expired', 'chore']
            });

            console.log('GitHub Issue 생성 완료');
