# Token Health Check — Weekly validation of deploy tokens
# Generalized from market-dashboard-v5
#
# Checks VERCEL_TOKEN validity every Monday.
# Creates GitHub Issue if expired/invalid.
# Prevents silent deploy failures.

name: Token Health Check

on:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday 00:00 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check VERCEL_TOKEN validity
        id: token_check
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v2/user")
          echo "status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "VERCEL_TOKEN valid (HTTP $HTTP_STATUS)"
          else
            echo "VERCEL_TOKEN invalid or expired (HTTP $HTTP_STATUS)"
          fi

      - name: Create issue if token invalid
        if: steps.token_check.outputs.status != '200'
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.token_check.outputs.status }}';
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'token-expired'
            });
            if (issues.data.length > 0) {
              console.log('Duplicate issue exists, skipping');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'VERCEL_TOKEN expired - deploys will fail',
              body: [
                '## Problem',
                `VERCEL_TOKEN is invalid or expired. (HTTP ${status})`,
                '',
                '## Fix',
                '1. [Vercel Tokens](https://vercel.com/account/tokens) -> Create -> No Expiration',
                '2. GitHub repo -> Settings -> Secrets -> Actions -> Update `VERCEL_TOKEN`',
                '',
                '---',
                'Generated by Token Health Check workflow'
              ].join('\n'),
              labels: ['token-expired', 'chore']
            });

