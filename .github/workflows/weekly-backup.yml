# Supabase 주간 자동 백업
# 매주 일요일 UTC 18:00 (월요일 KST 03:00)
# pg_dump → gzip → GitHub artifact (4주 보관)
# 실패 시 Issue 자동 생성 (중복 방지)

name: Supabase Weekly Backup

on:
  schedule:
    - cron: '0 18 * * 0'
  workflow_dispatch:

jobs:
  backup:
    name: dump / upload / notify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Dump Supabase database
        id: dump
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::SUPABASE_DB_URL secret 미등록 — Settings → Secrets → Actions에서 등록 필요"
            exit 1
          fi

          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          FILE="supabase-backup-${TIMESTAMP}.sql.gz"

          # --no-owner/--no-privileges: 복구 시 권한 충돌 방지
          # --format=plain + gzip: 범용 복구 편의
          pg_dump "$DATABASE_URL" \
            --no-owner \
            --no-privileges \
            --format=plain \
            | gzip --best > "$FILE"

          SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE")
          if [ "$SIZE" -lt 1024 ]; then
            echo "::error::덤프 파일 크기 비정상 (${SIZE}B < 1KB) — pg_dump 실패 의심"
            exit 1
          fi

          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "✅ 덤프 완료: $FILE ($(ls -lh "$FILE" | awk '{print $5}'))"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_number }}
          path: ${{ steps.dump.outputs.file }}
          retention-days: 28

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'supabase-backup-failed',
            });
            if (issues.data.length > 0) {
              console.log('이미 열린 백업 실패 이슈 존재, 중복 생성 생략');
              return;
            }
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🗄 Supabase 주간 백업 실패 — ${new Date().toISOString().slice(0,10)}`,
              body: [
                '## 문제',
                `주간 백업 워크플로우가 실패했습니다.`,
                `실행 로그: ${runUrl}`,
                '',
                '## 원인 후보',
                '- `SUPABASE_DB_URL` secret 미등록/만료',
                '- pg_dump 네트워크/TLS 오류',
                '- Supabase 측 연결 제한 (동시 접속/대역폭)',
                '',
                '## 조치',
                '1. Supabase Dashboard → Settings → Database → Connection string (URI 형식)',
                '2. GitHub Settings → Secrets → Actions → `SUPABASE_DB_URL` 갱신',
                '3. 워크플로우 수동 재실행 (`workflow_dispatch`)',
                '',
                '---',
                '🤖 Generated by Supabase Weekly Backup workflow',
              ].join('\n'),
              labels: ['supabase-backup-failed', 'chore'],
            });
            console.log('GitHub Issue 생성 완료');
