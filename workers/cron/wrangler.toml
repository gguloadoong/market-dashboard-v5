name = "mdv5-cron"
main = "src/index.js"
compatibility_date = "2024-12-01"

[triggers]
# #125: 크론 분리 — subrequest 한계(50/invocation) 회피
# 각 invocation이 단일 task만 실행하도록 오프셋 분산
crons = [
  "*/5 * * * *",       # coins — 00, 05, 10, 15, ...
  "1-56/5 * * * *",    # kr    — 01, 06, 11, 16, ...
  "2-57/5 * * * *",    # us    — 02, 07, 12, 17, ...
  "*/30 * * * *",
  "50 23 * * *"
]
